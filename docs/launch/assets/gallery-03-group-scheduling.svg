<svg xmlns="http://www.w3.org/2000/svg" width="1270" height="760" viewBox="0 0 1270 760">
  <rect width="1270" height="760" fill="#F8F5EF"/>
  <text x="88" y="118" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="800" fill="#171512">group scheduling</text>
  <text x="88" y="226" font-family="Inter, Arial, sans-serif" font-size="68" font-weight="820" fill="#171512">find a time across links</text>
  <text x="92" y="292" font-family="Inter, Arial, sans-serif" font-size="28" fill="#403B33">Exact slots first. Ranked alternatives when calendars collide.</text>
  <g transform="translate(92 380)">
    <text x="0" y="0" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="700" fill="#171512">participants</text>
    <rect x="0" y="28" width="520" height="120" rx="8" fill="#FFFFFF" stroke="#171512" stroke-opacity="0.2" stroke-width="2"/>
    <text x="24" y="74" font-family="Geist Mono, Menlo, monospace" font-size="20" fill="#403B33">schedule.pizza/alice?code=...</text>
    <text x="24" y="116" font-family="Geist Mono, Menlo, monospace" font-size="20" fill="#403B33">schedule.pizza/bob?code=...</text>
  </g>
  <g transform="translate(700 382)">
    <text x="0" y="0" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="700" fill="#171512">recommendations</text>
    <text x="0" y="70" font-family="Inter, Arial, sans-serif" font-size="24" fill="#403B33">Mon, Jun 29, 11:00 AM - 11:30 AM</text>
    <text x="0" y="122" font-family="Inter, Arial, sans-serif" font-size="24" fill="#403B33">alice is busy 10:30 AM - 11:00 AM</text>
    <text x="0" y="174" font-family="Inter, Arial, sans-serif" font-size="24" fill="#403B33">bob is free after lunch</text>
  </g>
</svg>
