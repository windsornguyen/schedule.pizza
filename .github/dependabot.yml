---
version: 2

updates:
  - package-ecosystem: "npm"
    directories:
      - "/"
      - "/apps/pizza"
    target-branch: "main"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "America/Los_Angeles"
    open-pull-requests-limit: 5
    labels: ["dependencies", "automated"]
    commit-message:
      prefix: "deps(npm)"
    groups:
      npm-minor-patch:
        patterns: ["*"]
        update-types: ["minor", "patch"]
        group-by: "dependency-name"
