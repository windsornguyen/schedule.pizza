---
name: Bug Report
description: Report a bug or unexpected behavior
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Before opening a new bug, search existing issues first. If you find the same issue, add a reaction or comment there instead of opening a duplicate.

  - type: textarea
    id: actual
    attributes:
      label: What happened?
      description: Include the exact error, request, response, or log output with secrets redacted.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Reproduction
      description: List the smallest commands, request payload, or UI steps needed to reproduce the issue.
      placeholder: |
        1. Start the app with `pnpm --filter @schedule.pizza/web dev`
        2. Request `/api/v1/availability?...`
        3. See error...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What should have happened instead?
    validations:
      required: true

  - type: input
    id: browser
    attributes:
      label: Browser
      description: If this is user-facing, which browser did you use?
      placeholder: "Chrome 126"

  - type: input
    id: node-version
    attributes:
      label: Node.js version
      description: Run `node --version` for local development issues.
      placeholder: "v24.0.0"

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Booking flow
        - Availability API
        - Authentication
        - Database schema
        - Cloudflare deployment
        - Documentation
        - Other
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Link related issues, PRs, or deployment runs if helpful.
