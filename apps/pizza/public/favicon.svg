<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- calendar body -->
  <rect x="1" y="5" width="30" height="26" rx="4" fill="#FFFFFF" stroke="#D32F2F" stroke-width="1.5"/>
  <!-- red top strip -->
  <rect x="1" y="5" width="30" height="8" rx="4" fill="#D32F2F"/>
  <rect x="1" y="9" width="30" height="4" fill="#D32F2F"/>
  <!-- binding rings -->
  <rect x="9" y="2" width="3" height="7" rx="1.5" fill="#D32F2F"/>
  <rect x="20" y="2" width="3" height="7" rx="1.5" fill="#D32F2F"/>
  <!-- ghost pizza - trapezoid, not triangle -->
