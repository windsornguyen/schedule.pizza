    <path d="M10 15 L22 15 L25 28 L7 28 Z" fill="#D32F2F"/>
  </g>
  <!-- number -->
  <text x="16" y="27" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#1A1A1A">67</text>
</svg>
