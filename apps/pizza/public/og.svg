<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <rect width="1200" height="630" fill="#F5E6D0"/>

  <!-- pizza slice, right side, low opacity -->
  <g opacity="0.10">
    <path d="M820 40 L1140 560 H500 Z" fill="#D32F2F" stroke="none"/>
    <circle cx="760" cy="280" r="28" fill="#F5E6D0"/>
    <circle cx="860" cy="380" r="24" fill="#F5E6D0"/>
    <circle cx="780" cy="430" r="26" fill="#F5E6D0"/>
    <path d="M500 560 Q820 520 1140 560" fill="none" stroke="#F5A623" stroke-width="16"/>
  </g>

  <!-- 67 calendar logo, top-left, no pizza behind it -->
  <rect x="60" y="50" rx="8" ry="8" width="48" height="48" fill="#D32F2F"/>
  <text x="84" y="84" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="700" fill="#FFFFFF">67</text>

  <!-- headline -->
  <text x="60" y="280" font-family="system-ui, -apple-system, sans-serif" font-size="64" font-weight="600" fill="#1A1A1A" letter-spacing="-1.5">The easiest way</text>
  <text x="60" y="360" font-family="system-ui, -apple-system, sans-serif" font-size="64" font-weight="600" fill="#1A1A1A" letter-spacing="-1.5">to find some time</text>

  <!-- byline -->
  <text x="60" y="420" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="400" fill="#8B7355">schedule.pizza</text>
</svg>
